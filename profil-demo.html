<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vitrine Enchantée” Profils</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:#4a351f;background:linear-gradient(145deg,#fff8e7,#f2dec0);padding:18px}.app{width:min(680px,100%);margin:auto}.entete{text-align:center;padding:20px 12px}h1{margin:0 0 8px;font-size:clamp(1.7rem,7vw,2.5rem)}.carte{background:#fffffff0;border:2px solid #e3c38e;border-radius:20px;padding:18px;box-shadow:0 8px 25px #573a1921;margin-bottom:16px}.statut{min-height:26px;text-align:center;font-weight:bold;margin-bottom:10px}.erreur{color:#b83232}.succes{color:#267a48}.profils{display:grid;gap:10px}.profil{width:100%;border:2px solid #ead6b4;background:#fffaf1;border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;text-align:left;font-size:1rem}.nom{font-size:1.15rem;font-weight:800}.solde{font-size:1.1rem;font-weight:800;color:#9b681e}form{display:grid;grid-template-columns:1fr auto;gap:10px}input,button{min-height:52px;border-radius:13px;font-size:1rem}input{width:100%;border:2px solid #d7bd93;padding:0 14px}button{border:0;padding:0 18px;font-weight:800;cursor:pointer}.ajouter{background:#8e5d26;color:#fff}.selection{display:none;text-align:center}.selection.visible{display:block}.avatar{font-size:3rem}.continuer{background:#2f7d50;color:#fff;width:100%;margin-top:12px}.changer{background:transparent;color:#765126;text-decoration:underline;min-height:42px}.note{font-size:.88rem;line-height:1.45;color:#765f49}@media(max-width:480px){body{padding:10px}.carte{padding:14px}form{grid-template-columns:1fr}}
</style>
</head>
<body><main class="app"><header class="entete"><h1>Vitrine Enchantée</h1><p>Qui joue aujourd'hui ?</p></header>
<section class="carte selection" id="selectionActive"><div class="avatar">ðŸ‘¤</div><h2 id="nomActif"></h2><p>Votre cagnotte : <strong id="soldeActif">0 â‚¬</strong></p><button class="continuer" id="continuerBtn">Entrer dans la vitrine</button><button class="changer" id="changerBtn">Changer de joueur</button></section>
<section id="choixProfils"><div class="carte"><div class="statut" id="statut">Chargement des profils</div><div class="profils" id="listeProfils"></div></div><div class="carte"><h2>Ajouter une personne</h2><form id="formProfil"><input id="prenom" maxlength="30" autocomplete="off" placeholder="Entrez un prénom" required><button class="ajouter">Ajouter</button></form><p class="note">Le prénom doit être unique. Un identifiant invisible est créé automatiquement.</p></div></section></main>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbyh1LbQNETMy0GS7A5SzACTPMYlFEal9W3-XZozkwzIkAAUhlo_InN-5FOrI9eEqPoEeA/exec';
const cle='vitrineProfilActif';
const e={statut:document.getElementById('statut'),liste:document.getElementById('listeProfils'),form:document.getElementById('formProfil'),prenom:document.getElementById('prenom'),choix:document.getElementById('choixProfils'),selection:document.getElementById('selectionActive'),nom:document.getElementById('nomActif'),solde:document.getElementById('soldeActif')};
function statut(m,t=''){e.statut.textContent=m;e.statut.className='statut '+t}function euros(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(n)||0)}
async function get(action,p={}){const u=new URL(API_URL);u.searchParams.set('action',action);Object.entries(p).forEach(([k,v])=>u.searchParams.set(k,v));const r=await fetch(u);return r.json()}
async function post(d){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)});return r.json()}
function selectionner(p){localStorage.setItem(cle,JSON.stringify({id:p.id,prenom:p.prenom}));e.nom.textContent=p.prenom;e.solde.textContent=euros(p.solde);e.selection.classList.add('visible');e.choix.hidden=true}
function afficher(profils){e.liste.innerHTML='';statut(profils.length?profils.length+' profil(s)':'Aucun profil. Ajoutez le premier prÃ©nom.');profils.forEach(p=>{const b=document.createElement('button');b.className='profil';b.innerHTML='<span class="nom"></span><span class="solde"></span>';b.children[0].textContent='ðŸ‘¤ '+p.prenom;b.children[1].textContent=euros(p.solde);b.onclick=()=>selectionner(p);e.liste.appendChild(b)});const m=JSON.parse(localStorage.getItem(cle)||'null');const p=profils.find(x=>m&&x.id===m.id);if(p)selectionner(p)}
async function charger(){if(!API_URL.startsWith('https://script.google.com/macros/s/'))return statut('Ajoutez votre URL Apps Script dans API_URL.','erreur');try{const r=await get('listerProfils');if(!r.ok)throw Error(r.erreur);afficher(r.profils)}catch(err){statut(err.message,'erreur')}}
e.form.onsubmit=async ev=>{ev.preventDefault();try{statut('CrÃ©ationâ€¦');const r=await post({action:'creerProfil',prenom:e.prenom.value.trim()});if(!r.ok)throw Error(r.erreur);e.form.reset();await charger();selectionner(r.profil)}catch(err){statut(err.message,'erreur')}};
document.getElementById('changerBtn').onclick=()=>{localStorage.removeItem(cle);e.selection.classList.remove('visible');e.choix.hidden=false};document.getElementById('continuerBtn').onclick=()=>alert('Profil sélectionné ! La vitrine arrivera Ã  l'étape suivante.');charger();
</script></body></html>
